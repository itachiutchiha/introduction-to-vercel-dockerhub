name: introduction-to-vercel-dockerhub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Install Prettier
        run: npm install --save-dev --save-exact prettier
      - name: Create Prettierrc File
        run: |
          echo '{
              "tabWidth": 4,
              "semi": true
          }' > .prettierrc
      - name: Run Prettierrc
        run: npx prettier --write .

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Print secrets
        run: |
          echo username -> ${{secrets.DOCKER_USERNAME}}
          echo username -> ${{secrets.DOCKER_PASSWORD}}
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build  -t attack_on_titan:latest .

      - name: List Docker Images
        run: docker images

      - name: Add Tag Name
        run: docker tag attack_on_titan:latest ${{ secrets.DOCKER_USERNAME }}/attack_on_titan:v1.0.0

      - name: List Docker Images After Tag
        run: docker images

      - name: Docker image
        run: docker images

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/attack_on_titan:v1.0.0
