name: introduction-to-vercel-dockerhub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Install Prettier
        run: npm install --save-dev --save-exact prettier
      - name: Create Prettierrc File
        run: |
          echo '{
              "tabWidth": 4,
              "semi": true
          }' > .prettierrc
      - name: Run Prettierrc
        run: npx prettier --write .

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Check .dockerignore exists
        run: ls -la .dockerignore || echo "ERROR-> .dockerignore not found!"

      - name: Build Docker Image whit debug output
        run: docker build --progress=plain -t attack_on_titan:latest .

      - name: List Files 2
        run: ls -al

      - name: Docker image
        run: docker images
