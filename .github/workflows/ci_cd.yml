name: introduction-to-vercel-dockerhub

on:
  push:
    branches:
     - main
  pull_request:
    branches:
     - main

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Install prettier
        run: npm install --save-dev --save-exact prettier
      - name: Create prettierrc file 
        run: |
          echo {
              "tabWidth": 4,
              "semi": true
          } > prettierrc
